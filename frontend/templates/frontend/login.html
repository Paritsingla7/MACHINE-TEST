{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
  <link rel="stylesheet" href="{% static 'frontend/css/base.css' %}?v={% now 'U' %}" />
  <link rel="stylesheet" href="{% static 'frontend/css/register.css' %}?v={% now 'U' %}" />
  <link rel="stylesheet" href="{% static 'frontend/css/login.css' %}?v={% now 'U' %}" />
</head>
<body>

  <header>
    <h1>Login</h1>
  </header>

  <div class="card">
    <h2>Welcome back</h2>

    <div class="error-box" id="errorBox">
      <ul id="errorList"></ul>
    </div>

    <form id="loginForm" novalidate>

      <div class="form-group">
        <label for="username">Username <span class="req">*</span></label>
        <input type="text" id="username" name="username" placeholder="e.g. john1234" autocomplete="username" />
      </div>

      <div class="form-group">
        <label for="password">Password <span class="req">*</span></label>
        <div class="input-with-eye">
          <input type="password" id="password" name="password" placeholder="Your password" autocomplete="current-password" />
          <button type="button" class="eye-btn" onclick="toggleEye('password', this)" tabindex="-1" aria-label="Toggle password visibility">
            <svg class="eye-open" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            <svg class="eye-closed" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
          </button>
        </div>
      </div>

      <div class="form-actions">
        <button type="submit" class="btn btn-primary" id="submitBtn">Login</button>
      </div>

    </form>

    <p class="login-footer">Don't have an account? <a href="/register/">Register here</a></p>
  </div>

  <script src="{% static 'frontend/js/auth.js' %}?v={% now 'U' %}"></script>
  <script src="{% static 'frontend/js/login.js' %}?v={% now 'U' %}"></script>
</body>
</html>
