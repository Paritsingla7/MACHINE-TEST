{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Profile</title>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <link rel="stylesheet" href="{% static 'frontend/css/base.css' %}?v={% now 'U' %}" />
  <link rel="stylesheet" href="{% static 'frontend/css/profile.css' %}?v={% now 'U' %}" />
</head>
<body>

  <header>
    <h1>My Profile</h1>
    <button class="btn-logout" onclick="AUTH.logout()">Logout</button>
  </header>

  <div class="profile-card">
    <div id="profileContent">
      <div class="loading-state">
        <div class="big-spinner"></div>
        <p>Loading profile…</p>
      </div>
    </div>
  </div>

  <!-- Change Password Modal -->
  <div class="modal-backdrop" id="changePwdModal" onclick="closePwdModal(event)">
    <div class="modal-card" onclick="event.stopPropagation()">
      <h3 class="modal-title">Change Password</h3>
      <div class="modal-error" id="changePwdError" style="display:none"></div>
      <div class="form-group">
        <label>Current Password</label>
        <div class="input-with-eye">
          <input type="password" id="oldPwd" placeholder="Current password" autocomplete="current-password" />
          <button type="button" class="eye-btn" onclick="toggleEye('oldPwd', this)" tabindex="-1" aria-label="Toggle password visibility">
            <svg class="eye-open" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            <svg class="eye-closed" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
          </button>
        </div>
      </div>
      <div class="form-group">
        <label>New Password</label>
        <div class="input-with-eye">
          <input type="password" id="newPwd" placeholder="Min. 8 characters" autocomplete="new-password" />
          <button type="button" class="eye-btn" onclick="toggleEye('newPwd', this)" tabindex="-1" aria-label="Toggle password visibility">
            <svg class="eye-open" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            <svg class="eye-closed" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
          </button>
        </div>
      </div>
      <div class="form-group">
        <label>Confirm New Password</label>
        <div class="input-with-eye">
          <input type="password" id="confirmPwd" placeholder="Repeat new password" autocomplete="new-password" />
          <button type="button" class="eye-btn" onclick="toggleEye('confirmPwd', this)" tabindex="-1" aria-label="Toggle password visibility">
            <svg class="eye-open" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            <svg class="eye-closed" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
          </button>
        </div>
      </div>
      <div class="modal-actions">
        <button type="button" class="btn btn-secondary" onclick="closePwdModal()">Cancel</button>
        <button type="button" class="btn btn-primary" id="changePwdBtn" onclick="submitChangePwd()">Update Password</button>
      </div>
    </div>
  </div>

  <script src="{% static 'frontend/js/auth.js' %}?v={% now 'U' %}"></script>
  <script src="{% static 'frontend/js/profile.js' %}?v={% now 'U' %}"></script>
</body>
</html>
