{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password</title>
  <link rel="stylesheet" href="{% static 'frontend/css/base.css' %}?v={% now 'U' %}" />
  <link rel="stylesheet" href="{% static 'frontend/css/register.css' %}?v={% now 'U' %}" />
  <link rel="stylesheet" href="{% static 'frontend/css/login.css' %}?v={% now 'U' %}" />
</head>
<body>

  <header>
    <h1>Forgot Password</h1>
  </header>

  <div class="card">
    <h2>Reset your password</h2>

    <p style="font-size:0.88rem;color:#7d6a55;margin-bottom:20px;line-height:1.5;">
      Enter the email address linked to your account and we'll send you a reset link.
    </p>

    <div class="success-box" id="successBox" style="display:none"></div>
    <div class="error-box" id="errorBox">
      <ul id="errorList"></ul>
    </div>

    <form id="forgotForm" novalidate>
      <div class="form-group">
        <label for="email">Email <span class="req">*</span></label>
        <input type="email" id="email" name="email" placeholder="your@email.com" autocomplete="email" />
      </div>

      <div class="form-actions">
        <button type="submit" class="btn btn-primary" id="submitBtn">Send Reset Link</button>
      </div>
    </form>

    <p class="login-footer"><a href="/login/">Back to Login</a></p>
  </div>

  <script src="{% static 'frontend/js/forgot_password.js' %}?v={% now 'U' %}"></script>
</body>
</html>
