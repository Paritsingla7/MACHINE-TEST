{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>User List</title>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <link rel="stylesheet" href="{% static 'frontend/css/base.css' %}?v={% now 'U' %}" />
  <link rel="stylesheet" href="{% static 'frontend/css/users.css' %}?v={% now 'U' %}" />
</head>
<body>

  <div class="page-wrapper">
    <header>
      <h1>Users</h1>
      <a href="/register/">&plus; Register User</a>
    </header>

    <div class="filter-card">
      <div class="filter-group">
        <label for="filterName">Name</label>
        <input type="text" id="filterName" placeholder="Search by name…" />
      </div>

      <div class="filter-group">
        <label for="filterState">State</label>
        <select id="filterState">
          <option value="">All States</option>
        </select>
      </div>

      <div class="filter-group">
        <label for="filterGender">Gender</label>
        <select id="filterGender">
          <option value="">All Genders</option>
          <option value="M">Male</option>
          <option value="F">Female</option>
        </select>
      </div>

      <div class="filter-actions">
        <button class="btn btn-primary" onclick="applyFilters()">Search</button>
        <button class="btn btn-outline" onclick="clearFilters()">Clear</button>
      </div>
    </div>

    <div class="results-bar">
      <span id="resultsSummary"></span>
    </div>

    <div class="table-card">
      <div id="tableContainer">
        <div class="loading-state">
          <div class="big-spinner"></div>
          <p>Loading users…</p>
        </div>
      </div>
      <div class="pagination" id="pagination" style="display:none;"></div>
    </div>
  </div>

  <script src="{% static 'frontend/js/users.js' %}?v={% now 'U' %}"></script>
</body>
</html>
