{% load static %}
<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register Profile</title>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/material_orange.css" />
  <link rel="stylesheet" href="{% static 'frontend/css/base.css' %}?v={% now 'U' %}" />
  <link rel="stylesheet" href="{% static 'frontend/css/register.css' %}?v={% now 'U' %}" />
</head>
<body>

  <header>
    <h1>User Registration</h1>
  </header>

  <div class="card">
    <h2>Profile Details</h2>

    <!-- All API/validation errors shown here at once -->
    <div class="error-box" id="errorBox">
      <ul id="errorList"></ul>
    </div>

    <form id="registerForm" novalidate>

      <div class="form-row">
        <div class="form-group">
          <label for="name">Full Name <span class="req">*</span></label>
          <input type="text" id="name" name="name" placeholder="e.g. John Doe" maxlength="25" />
          <span class="field-error" id="err-name"></span>
        </div>

        <div class="form-group">
          <label for="birth_date">Date of Birth <span class="req">*</span></label>
          <input type="text" id="birth_date" name="birth_date" placeholder="DD/MM/YYYY" maxlength="10" />
          <span class="field-error" id="err-birth_date"></span>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="username">Username <span class="req">*</span> <span style="color:#4a4a6a;font-weight:400;text-transform:none;font-size:0.85em;">(≥4 letters + ≥4 numbers)</span></label>
          <input type="text" id="username" name="username" placeholder="e.g. john1234" maxlength="50" autocomplete="username" />
          <span class="field-error" id="err-username"></span>
        </div>

        <div class="form-group">
          <label for="password">Password <span class="req">*</span></label>
          <div class="input-with-eye">
            <input type="password" id="password" name="password" placeholder="Min. 8 characters" autocomplete="new-password" />
            <button type="button" class="eye-btn" onclick="toggleEye('password', this)" tabindex="-1" aria-label="Toggle password visibility">
              <svg class="eye-open" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              <svg class="eye-closed" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
            </button>
          </div>
          <span class="field-error" id="err-password"></span>
        </div>
      </div>

      <div class="form-group">
        <label>Gender <span class="req">*</span></label>
        <div class="gender-group">
          <div class="gender-option">
            <input type="radio" id="genderM" name="gender" value="M" />
            <label for="genderM">&#9794; Male</label>
          </div>
          <div class="gender-option">
            <input type="radio" id="genderF" name="gender" value="F" />
            <label for="genderF">&#9792; Female</label>
          </div>
        </div>
        <span class="field-error" id="err-gender"></span>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="john@example.com" />
          <span class="field-error" id="err-email"></span>
        </div>

        <div class="form-group">
          <label for="phone">Phone</label>
          <input type="text" id="phone" name="phone" placeholder="10-digit number" maxlength="10" />
          <span class="field-error" id="err-phone"></span>
        </div>

        <div class="form-group">
          <label for="mobile">Mobile</label>
          <input type="text" id="mobile" name="mobile" placeholder="10-digit number" maxlength="10" />
          <span class="field-error" id="err-mobile"></span>
        </div>

        <div class="form-group">
          <label for="state">State <span class="req">*</span></label>
          <select id="state" name="state">
            <option value="">Loading states…</option>
          </select>
          <span class="field-error" id="err-state"></span>
        </div>

        <div class="form-group">
          <label for="city">City</label>
          <select id="city" name="city" disabled>
            <option value="">Select a state first</option>
          </select>
          <span class="field-error" id="err-city"></span>
        </div>
      </div>

      <div class="form-group">
        <label>Hobbies</label>
        <div class="hobbies-grid" id="hobbiesGrid">
          <span style="color:#9a7e65;font-size:0.88rem;">Loading hobbies…</span>
        </div>
      </div>

      <div class="form-group full">
        <label>Profile Photo <span style="color:#4a4a6a;font-weight:400;text-transform:none;">(JPG or PNG)</span></label>
        <div class="photo-upload" id="photoUploadArea">
          <img class="photo-preview" id="photoPreview" src="" alt="Preview" />
          <input type="file" id="photo" name="photo" accept=".jpg,.jpeg,.png" />
          <div class="upload-icon">&#128247;</div>
          <div class="upload-text"><strong>Click to upload</strong> or drag &amp; drop</div>
          <div class="upload-hint">JPG or PNG only</div>
          <div class="file-name" id="fileName"></div>
        </div>
        <span class="field-error" id="err-photo"></span>
      </div>

      <!-- T&C — always visible, checked only after all validations pass -->
      <div class="form-group">
        <label>Terms &amp; Conditions <span class="req">*</span></label>
        <label class="tnc-group" id="tncGroup">
          <input type="checkbox" id="tnc" />
          <span>I confirm that all the information provided is accurate and I agree to the <a href="#">Terms &amp; Conditions</a> and <a href="#">Privacy Policy</a>.</span>
        </label>
        <span class="field-error" id="err-tnc"></span>
      </div>

      <div class="form-actions">
        <button type="button" class="btn btn-secondary" onclick="resetForm()">Clear</button>
        <button type="submit" class="btn btn-primary" id="submitBtn">Register</button>
      </div>
    </form>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script src="{% static 'frontend/js/auth.js' %}?v={% now 'U' %}"></script>
  <script src="{% static 'frontend/js/register.js' %}?v={% now 'U' %}"></script>
</body>
</html>
